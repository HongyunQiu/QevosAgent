<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QevosAgent · Web View</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3e;
    --accent: #6c8ef5;
    --accent-dim: #3a4a8a;
    --text: #e2e4ef;
    --text-dim: #7a7f9a;
    --chat-glass: rgba(15, 17, 28, 0.72);
    --chat-border: rgba(108, 142, 245, 0.25);
    --agent-bubble: rgba(108, 142, 245, 0.18);
    --user-bubble: rgba(60, 180, 120, 0.18);
    --radius: 10px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    overflow: hidden;
  }

  /* ── tab bar ── */
  #tab-bar {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 8px 12px 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    min-height: 42px;
    overflow-x: auto;
    flex-shrink: 0;
  }
  #tab-bar::-webkit-scrollbar { height: 4px; }
  #tab-bar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .tab {
    padding: 6px 16px;
    border-radius: var(--radius) var(--radius) 0 0;
    cursor: pointer;
    color: var(--text-dim);
    border: 1px solid transparent;
    border-bottom: none;
    white-space: nowrap;
    transition: color .15s, background .15s;
    font-size: 13px;
  }
  .tab:hover { color: var(--text); background: rgba(255,255,255,.04); }
  .tab.active {
    color: var(--accent);
    background: var(--bg);
    border-color: var(--border);
  }
  .tab-badge {
    display: inline-block;
    width: 7px; height: 7px;
    background: #e05555;
    border-radius: 50%;
    margin-left: 5px;
    vertical-align: middle;
  }

  /* ── content area ── */
  #content-wrap {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .display-pane {
    display: none;
    position: absolute;
    inset: 0;
    overflow: auto;
    padding: 20px;
  }
  .display-pane.active { display: block; }
  .display-pane::-webkit-scrollbar { width: 6px; }
  .display-pane::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* empty state */
  #empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-dim);
  }
  #empty-state svg { opacity: .3; }
  #empty-state p { font-size: 13px; }

  /* ── content renderers ── */
  .md-body { line-height: 1.7; max-width: 820px; }
  .md-body h1,.md-body h2,.md-body h3 { margin: 1em 0 .4em; color: var(--text); }
  .md-body p { margin-bottom: .8em; }
  .md-body pre { background: #12141e; border: 1px solid var(--border); border-radius: 6px; padding: 12px; overflow-x: auto; }
  .md-body code { font-family: 'Cascadia Code','Fira Code',monospace; font-size: 12.5px; }
  .md-body :not(pre) > code { background: rgba(255,255,255,.08); padding: 1px 5px; border-radius: 3px; }
  .md-body table { border-collapse: collapse; width: 100%; margin-bottom: 1em; }
  .md-body th,.md-body td { border: 1px solid var(--border); padding: 6px 10px; }
  .md-body th { background: var(--surface); }
  .md-body a { color: var(--accent); }
  .md-body blockquote { border-left: 3px solid var(--accent-dim); padding-left: 12px; color: var(--text-dim); }

  .data-table { border-collapse: collapse; width: 100%; }
  .data-table th { background: var(--surface); color: var(--accent); font-weight: 600; }
  .data-table th,.data-table td { border: 1px solid var(--border); padding: 7px 12px; text-align: left; }
  .data-table tr:nth-child(even) { background: rgba(255,255,255,.025); }

  .text-pre { font-family: 'Cascadia Code','Fira Code',monospace; font-size: 12.5px;
    white-space: pre-wrap; word-break: break-word; line-height: 1.6; }

  .chart-wrap { width: 100%; height: min(70vh, 560px); }

  .image-wrap img { max-width: 100%; border-radius: var(--radius); }

  /* ── layout ── */
  body { display: flex; flex-direction: column; }

  /* ── floating chat widget ── */
  #chat-widget {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: min(680px, 96vw);
    z-index: 100;
    display: flex;
    flex-direction: column;
    border-radius: var(--radius) var(--radius) 0 0;
    border: 1px solid var(--chat-border);
    border-bottom: none;
    background: var(--chat-glass);
    backdrop-filter: blur(18px) saturate(1.4);
    -webkit-backdrop-filter: blur(18px) saturate(1.4);
    transition: max-height .28s cubic-bezier(.4,0,.2,1);
    overflow: hidden;
    max-height: 44px; /* collapsed */
    box-shadow: 0 -4px 32px rgba(0,0,0,.5);
  }
  #chat-widget.expanded { max-height: 52vh; }

  #chat-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 44px;
    cursor: pointer;
    flex-shrink: 0;
    gap: 8px;
    color: var(--text-dim);
    font-size: 12px;
    user-select: none;
    transition: color .15s;
  }
  #chat-toggle:hover { color: var(--text); }

  #chat-toggle-arrow {
    font-size: 11px;
    transition: transform .25s;
    display: inline-block;
  }
  #chat-widget.expanded #chat-toggle-arrow { transform: rotate(180deg); }

  #chat-unread-dot {
    min-width: 16px;
    height: 16px;
    background: #e05555;
    border-radius: 8px;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    padding: 0 4px;
    line-height: 16px;
  }
  #chat-unread-dot.visible { display: inline-flex; }

  @keyframes chat-glow {
    0%, 100% {
      box-shadow: 0 -4px 32px rgba(0,0,0,.5), 0 0 0 0 rgba(224,85,85,0);
      border-color: var(--chat-border);
    }
    50% {
      box-shadow: 0 -4px 32px rgba(0,0,0,.5), 0 0 18px 6px rgba(224,85,85,.55);
      border-color: rgba(224,85,85,.7);
    }
  }
  #chat-widget.has-unread {
    animation: chat-glow 1.8s ease-in-out infinite;
  }

  #chat-history {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px 4px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 60px;
  }
  #chat-history::-webkit-scrollbar { width: 4px; }
  #chat-history::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .chat-msg {
    display: flex;
    flex-direction: column;
    gap: 2px;
    max-width: 88%;
  }
  .chat-msg.agent { align-self: flex-start; }
  .chat-msg.user  { align-self: flex-end; }

  .chat-bubble {
    padding: 7px 12px;
    border-radius: 12px;
    line-height: 1.5;
    font-size: 13px;
    word-break: break-word;
  }
  .chat-msg.agent .chat-bubble {
    background: var(--agent-bubble);
    border: 1px solid rgba(108,142,245,.22);
    border-bottom-left-radius: 3px;
    color: var(--text);
  }
  .chat-msg.user .chat-bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(60,180,120,.22);
    border-bottom-right-radius: 3px;
    color: var(--text);
  }
  .chat-meta {
    font-size: 10px;
    color: var(--text-dim);
    padding: 0 4px;
  }
  .chat-msg.user .chat-meta { text-align: right; }

  #chat-input-row {
    display: flex;
    gap: 8px;
    padding: 8px 12px 10px;
    flex-shrink: 0;
    border-top: 1px solid var(--chat-border);
  }

  #chat-input {
    flex: 1;
    background: rgba(255,255,255,.06);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 7px 12px;
    font-size: 13px;
    outline: none;
    transition: border-color .15s;
  }
  #chat-input:focus { border-color: var(--accent); }
  #chat-input::placeholder { color: var(--text-dim); }

  #chat-send {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 7px 16px;
    cursor: pointer;
    font-size: 13px;
    transition: opacity .15s;
  }
  #chat-send:hover { opacity: .85; }
  #chat-send:disabled { opacity: .4; cursor: default; }

  /* ── attach button ── */
  #attach-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    width: 34px;
    min-width: 34px;
    cursor: pointer;
    font-size: 20px;
    font-weight: 300;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    align-self: stretch;
    transition: color .15s, border-color .15s, background .15s;
  }
  #attach-btn:hover { color: var(--accent); border-color: var(--accent); }
  #attach-btn.has-image {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(108,142,245,.12);
  }

  /* ── image preview bar (above input row) ── */
  #img-preview-bar {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 6px 12px 0;
  }
  #img-preview-bar.visible { display: flex; }
  .img-preview-thumb {
    width: 38px;
    height: 38px;
    border-radius: 6px;
    object-fit: cover;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .img-preview-name {
    font-size: 12px;
    color: var(--text-dim);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .img-preview-remove {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    padding: 3px 6px;
    border-radius: 4px;
    line-height: 1;
    transition: color .15s, background .15s;
  }
  .img-preview-remove:hover { color: #e05555; background: rgba(224,85,85,.12); }

  /* ── image thumbnail inside chat bubble ── */
  .chat-bubble .chat-img-thumb {
    display: block;
    max-width: 180px;
    max-height: 120px;
    border-radius: 6px;
    margin-top: 5px;
    border: 1px solid var(--border);
    cursor: pointer;
  }

  /* ── run info badge ── */
  #run-info {
    position: fixed;
    top: 10px;
    right: 14px;
    font-size: 11px;
    color: var(--text-dim);
    background: rgba(26,29,39,.8);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    z-index: 50;
  }
  #run-info .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-right: 5px;
    background: var(--text-dim);
    vertical-align: middle;
  }
  #run-info .dot.alive { background: #4caf87; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
</style>
<script src="/ui_i18n.js"></script>
</head>
<body>

<!-- tab bar -->
<div id="tab-bar">
  <span id="no-tabs" style="color:var(--text-dim);font-size:12px;padding:0 4px;"></span>
</div>

<!-- content -->
<div id="content-wrap">
  <div id="empty-state">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
      <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
    </svg>
    <p id="empty-p1"></p>
    <p id="empty-p2" style="font-size:11px"></p>
  </div>
</div>

<!-- run info -->
<div id="run-info"><span class="dot" id="alive-dot"></span><span id="run-label">—</span></div>

<!-- floating chat widget -->
<div id="chat-widget">
  <div id="chat-toggle" onclick="toggleChat()">
    <span id="chat-unread-dot"></span>
    <span id="chat-toggle-label">Chat</span>
    <span id="chat-toggle-arrow">▲</span>
  </div>
  <div id="chat-history"></div>
  <div id="img-preview-bar"></div>
  <div id="chat-input-row">
    <input type="file" id="img-picker" accept="image/*" style="display:none">
    <button id="attach-btn" onclick="triggerImagePicker()">+</button>
    <input id="chat-input" type="text" autocomplete="off">
    <button id="chat-send" onclick="sendMessage()"></button>
  </div>
</div>

<script>
// ── URL parse ─────────────────────────────────────────────────────────────────
const pathParts = location.pathname.split('/').filter(Boolean); // ['view', runId, displayId?]
const runId     = pathParts[1] || null;
const initTab   = pathParts[2] || null;

// ── State ─────────────────────────────────────────────────────────────────────
let displays    = {};   // { display_id: { content_type, title, content, ... } }
let activeTabId = initTab || null;
let chatExpanded = false;
let chatUnread   = 0;
let agentAlive   = false;
let _wasAlive    = false;  // detect alive→offline transition
let pendingImage = null; // { dataUrl, filename, mimeType }

// ── WebSocket ─────────────────────────────────────────────────────────────────
const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
const ws = new WebSocket(`${wsProto}//${location.host}`);

ws.addEventListener('message', e => {
  let msg;
  try { msg = JSON.parse(e.data); } catch { return; }

  if (msg.type === 'state') {
    const wd = msg.webDisplays || {};
    // only process if this state belongs to our runId (or no specific runId)
    if (runId && msg.activeRunId !== runId) {
      // still update alive status from historical context
    } else {
      applyDisplays(wd);
    }
    // alive dot
    agentAlive = !!msg.agentAlive;
    updateRunInfo(msg.activeRunId, agentAlive);
  }

  if (msg.type === 'web_chat') {
    if (!runId || msg.display_id === '*' || msg.display_id === activeTabId || !activeTabId) {
      appendChatMessage(msg.role || 'agent', msg.message, msg.ts);
    }
  }
});

ws.addEventListener('open', () => {
  // If viewing a historical run, request its data
  if (runId) {
    ws.send(JSON.stringify({ type: 'select_run', runId }));
  }
});

// For historical runs, also fetch display files via REST
if (runId) {
  fetch(`/api/run/${runId}`)
    .then(r => r.json())
    .then(data => {
      if (data && data.runId) {
        updateRunInfo(data.runId, false);
      }
    })
    .catch(() => {});

  // Fetch web display files by listing run files
  fetch(`/api/run-files/${runId}`)
    .then(r => r.json())
    .then(data => {
      if (!data.files) return;
      const dispFiles = data.files.filter(f => /^web_display_(.+)\.json$/.test(f.path));
      Promise.all(dispFiles.map(f =>
        fetch(`/api/run-file/${runId}/${encodeURIComponent(f.path)}`)
          .then(r => r.json())
          .then(d => { try { return JSON.parse(d.content); } catch { return null; } })
      )).then(results => {
        const map = {};
        for (const item of results) {
          if (item && item.display_id) map[item.display_id] = item;
        }
        applyDisplays(map);
      });
    })
    .catch(() => {});
}

// ── Display rendering ─────────────────────────────────────────────────────────
function applyDisplays(wd) {
  let changed = false;
  for (const [id, data] of Object.entries(wd)) {
    const existing = displays[id];
    if (!existing || existing.updated_at !== data.updated_at) {
      displays[id] = data;
      changed = true;
      ensureTab(id, data.title || id);
      renderPane(id, data);
    }
  }
  if (changed) {
    document.getElementById('empty-state').style.display = 'none';
    // activate if no tab is visually active yet (covers both fresh load and URL-preset activeTabId)
    if (!document.querySelector('.tab.active')) {
      const targetId = (activeTabId && displays[activeTabId]) ? activeTabId : Object.keys(displays)[0];
      activateTab(targetId);
    }
    // hide tab bar when only one display, show when multiple
    const tabCount = Object.keys(displays).length;
    document.getElementById('tab-bar').style.display = tabCount > 1 ? 'flex' : 'none';
  }
}

function ensureTab(id, label) {
  if (document.getElementById(`tab-${id}`)) return;
  document.getElementById('no-tabs').style.display = 'none';

  const tab = document.createElement('div');
  tab.className = 'tab';
  tab.id = `tab-${id}`;
  tab.dataset.id = id;
  tab.innerHTML = `<span class="tab-label">${escHtml(label)}</span>`;
  tab.onclick = () => activateTab(id);
  document.getElementById('tab-bar').appendChild(tab);

  const pane = document.createElement('div');
  pane.className = 'display-pane';
  pane.id = `pane-${id}`;
  document.getElementById('content-wrap').appendChild(pane);
}

function activateTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.id === id));
  document.querySelectorAll('.display-pane').forEach(p => p.classList.toggle('active', p.id === `pane-${id}`));
  // clear badge on the tab we're activating
  const badge = document.querySelector(`#tab-${id} .tab-badge`);
  if (badge) badge.remove();
  activeTabId = id;
  history.replaceState(null, '', `/view/${runId}/${id}`);
}

function renderPane(id, data) {
  const pane = document.getElementById(`pane-${id}`);
  if (!pane) return;

  // flash tab badge if not active
  if (activeTabId && activeTabId !== id) {
    const tab = document.getElementById(`tab-${id}`);
    if (tab && !tab.querySelector('.tab-badge')) {
      tab.insertAdjacentHTML('beforeend', '<span class="tab-badge"></span>');
    }
  }

  const ct = (data.content_type || 'html').toLowerCase();

  // base_path: directory (relative to the run dir) that this content's relative
  // resource paths should resolve against — set when web_show was given a file path
  // living in a subdirectory (e.g. "artifacts"). Empty = run dir root.
  const basePrefix = (data.base_path || '').replace(/^\/+|\/+$/g, '');
  const baseSeg = basePrefix ? basePrefix + '/' : '';

  // Resolve a potentially relative image/resource path to an absolute API URL.
  // Paths that are already absolute (http/https/data/blob) or start with /api/ are
  // left unchanged. Everything else is treated as relative to the run directory
  // (optionally under base_path) and rewritten to /api/run-file-raw/{runId}/{path}.
  function resolveRunPath(src) {
    if (!src || !runId) return src;
    if (/^(https?:|data:|blob:|\/\/|\/api\/)/.test(src)) return src;
    const rel = src.replace(/^\.\//, '');
    // absolute filesystem path (e.g. C:/.. or /home/..) can't be served safely
    if (/^([A-Za-z]:[\\/]|file:|[\\/])/.test(rel)) return src;
    return `/api/run-file-raw/${runId}/${baseSeg}${rel}`;
  }

  // Inject a <base href> into a full HTML document so that relative resource paths
  // inside sandboxed iframes (which have no inherent base URL) resolve correctly via
  // the run-file-raw endpoint.
  function injectBaseHref(html) {
    if (!runId) return html;
    const base = `<base href="${window.location.origin}/api/run-file-raw/${runId}/${baseSeg}">`;
    if (/<head[\s>]/i.test(html)) {
      return html.replace(/(<head[^>]*>)/i, `$1${base}`);
    }
    // No <head> tag — insert before everything else
    return base + html;
  }

  // Rewrite relative src/href attributes in a fragment of HTML using DOMParser so
  // that images embedded in partial HTML snippets also resolve correctly.
  function rewriteFragmentImages(html) {
    if (!runId) return html;
    try {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      doc.querySelectorAll('img[src]').forEach(img => {
        img.setAttribute('src', resolveRunPath(img.getAttribute('src')));
      });
      // Return inner content; DOMParser always wraps in <html><body>
      return doc.body.innerHTML;
    } catch {
      return html;
    }
  }

  if (ct === 'html') {
    const html = data.content || '';
    const isFullDoc = /<!DOCTYPE|<html/i.test(html.trimStart().slice(0, 20));
    if (isFullDoc) {
      // full HTML document — render in sandboxed iframe to preserve its own CSS/JS
      pane.innerHTML = '';
      pane.style.padding = '0';
      const iframe = document.createElement('iframe');
      iframe.style.cssText = 'width:100%;height:100%;border:none;display:block;';
      iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms');
      iframe.srcdoc = injectBaseHref(html);
      pane.appendChild(iframe);
    } else {
      pane.innerHTML = rewriteFragmentImages(html);
      pane.querySelectorAll('script').forEach(old => {
        const s = document.createElement('script');
        s.textContent = old.textContent;
        old.replaceWith(s);
      });
    }
  } else if (ct === 'markdown') {
    const div = document.createElement('div');
    div.className = 'md-body';
    div.innerHTML = rewriteFragmentImages(marked.parse(data.content || ''));
    pane.innerHTML = '';
    pane.appendChild(div);
  } else if (ct === 'text') {
    pane.innerHTML = `<pre class="text-pre">${escHtml(data.content || '')}</pre>`;
  } else if (ct === 'table') {
    pane.innerHTML = renderTable(data.content);
  } else if (ct === 'chart') {
    pane.innerHTML = '<div class="chart-wrap" id="chart-' + id + '"></div>';
    setTimeout(() => {
      try {
        const option = typeof data.content === 'string' ? JSON.parse(data.content) : data.content;
        const chart = echarts.init(document.getElementById('chart-' + id), 'dark');
        chart.setOption(option);
        window.addEventListener('resize', () => chart.resize());
      } catch(e) {
        pane.innerHTML = `<pre class="text-pre" style="color:#e05555">${escHtml(uiT('view.chart_error', { e: String(e), data: data.content }))}</pre>`;
      }
    }, 0);
  } else if (ct === 'image') {
    const src = resolveRunPath(data.content || '');
    pane.innerHTML = `<div class="image-wrap"><img src="${escHtml(src)}" alt="image"></div>`;
  } else {
    pane.innerHTML = data.content || '';
  }
}

function renderTable(content) {
  let rows;
  try { rows = typeof content === 'string' ? JSON.parse(content) : content; } catch { return `<pre>${escHtml(String(content))}</pre>`; }
  if (!Array.isArray(rows) || rows.length === 0) return `<p style="color:var(--text-dim)">${uiT('view.empty_table')}</p>`;
  const cols = Object.keys(rows[0]);
  const thead = `<tr>${cols.map(c => `<th>${escHtml(String(c))}</th>`).join('')}</tr>`;
  const tbody = rows.map(r => `<tr>${cols.map(c => `<td>${escHtml(String(r[c] ?? ''))}</td>`).join('')}</tr>`).join('');
  return `<table class="data-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
}

// ── Chat ──────────────────────────────────────────────────────────────────────
function toggleChat() {
  chatExpanded = !chatExpanded;
  const widget = document.getElementById('chat-widget');
  widget.classList.toggle('expanded', chatExpanded);
  if (chatExpanded) {
    chatUnread = 0;
    const dot = document.getElementById('chat-unread-dot');
    dot.classList.remove('visible');
    dot.textContent = '';
    widget.classList.remove('has-unread');
    scrollChatToBottom();
  }
}

function appendChatMessage(role, message, ts, imageDataUrl) {
  const history = document.getElementById('chat-history');
  const div = document.createElement('div');
  div.className = `chat-msg ${role}`;
  const time = ts ? new Date(ts * 1000).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : '';
  const label = role === 'agent' ? 'Agent' : uiT('view.user_label');
  const imgHtml = imageDataUrl
    ? `<img class="chat-img-thumb" src="${escAttr(imageDataUrl)}" alt="${uiT('view.img_alt')}" onclick="this.style.maxWidth=this.style.maxWidth?'':'100%'">`
    : '';
  div.innerHTML = `
    <div class="chat-bubble">${message ? escHtml(message) : ''}${imgHtml}</div>
    <div class="chat-meta">${label}${time ? ' · ' + time : ''}</div>
  `;
  history.appendChild(div);
  scrollChatToBottom();

  if (!chatExpanded && role === 'agent') {
    chatUnread++;
    const dot = document.getElementById('chat-unread-dot');
    dot.textContent = chatUnread > 9 ? '9+' : String(chatUnread);
    dot.classList.add('visible');
    document.getElementById('chat-widget').classList.add('has-unread');
  }
}

function scrollChatToBottom() {
  const h = document.getElementById('chat-history');
  h.scrollTop = h.scrollHeight;
}

// ── Image attach ──────────────────────────────────────────────────────────────
function triggerImagePicker() {
  document.getElementById('img-picker').click();
}

document.getElementById('img-picker').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    pendingImage = { dataUrl: ev.target.result, filename: file.name, mimeType: file.type || 'image/jpeg' };
    const bar = document.getElementById('img-preview-bar');
    bar.innerHTML = `
      <img class="img-preview-thumb" src="${escAttr(pendingImage.dataUrl)}" alt="">
      <span class="img-preview-name">${escHtml(pendingImage.filename)}</span>
      <button class="img-preview-remove" onclick="clearPendingImage()" title="${uiT('view.remove_title')}">✕</button>`;
    bar.classList.add('visible');
    document.getElementById('attach-btn').classList.add('has-image');
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

function clearPendingImage() {
  pendingImage = null;
  const bar = document.getElementById('img-preview-bar');
  bar.innerHTML = '';
  bar.classList.remove('visible');
  document.getElementById('attach-btn').classList.remove('has-image');
}

async function sendMessage() {
  if (!agentAlive) return;
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg && !pendingImage) return;

  const btn = document.getElementById('chat-send');
  btn.disabled = true;
  input.value = '';

  const img = pendingImage;
  clearPendingImage();
  appendChatMessage('user', msg, null, img?.dataUrl);

  try {
    if (img) {
      const body = {
        imageData: img.dataUrl.split(',')[1],
        imageType: img.mimeType,
        filename:  img.filename,
        message:   msg,
      };
      if (runId) body.runId = runId;
      const res = await fetch('/api/inject-image', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
    } else {
      const body = { command: `/inject ${uiT('view.web_user_prefix')}: ${msg}` };
      if (runId) body.runId = runId;
      const res = await fetch('/api/inject', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
    }
  } catch (e) {
    appendChatMessage('agent', uiT('view.send_failed', { msg: e.message }));
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── Run info ──────────────────────────────────────────────────────────────────
function _setChatOffline() {
  const chatInput = document.getElementById('chat-input');
  const chatSend  = document.getElementById('chat-send');
  chatInput.disabled    = true;
  chatInput.placeholder = uiT('view.agent_offline');
  chatSend.disabled     = true;
  appendChatMessage('agent', uiT('view.agent_offline_msg'));
}

function updateRunInfo(id, alive) {
  document.getElementById('run-label').textContent = id || runId || '—';
  const dot = document.getElementById('alive-dot');
  dot.className = `dot${alive ? ' alive' : ''}`;

  if (_wasAlive && !alive) {
    _setChatOffline();
  }
  _wasAlive = alive;
}

if (runId) updateRunInfo(runId, false);

// ── Helpers ───────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── i18n static element init ──────────────────────────────────────────────────
(function () {
  const noTabs = document.getElementById('no-tabs');
  if (noTabs) noTabs.textContent = uiT('view.waiting');
  const p1 = document.getElementById('empty-p1');
  if (p1) p1.innerHTML = uiT('view.empty_p1');
  const p2 = document.getElementById('empty-p2');
  if (p2) p2.innerHTML = uiT('view.empty_p2');
  const attachBtn = document.getElementById('attach-btn');
  if (attachBtn) attachBtn.title = uiT('view.attach_title');
  const chatInput = document.getElementById('chat-input');
  if (chatInput) chatInput.placeholder = uiT('view.input_placeholder');
  const chatSend = document.getElementById('chat-send');
  if (chatSend) chatSend.textContent = uiT('view.send_btn');
})();
</script>
