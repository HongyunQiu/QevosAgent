<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>QevosAgent · 终端</title>
  <link rel="stylesheet" href="/vendor/xterm/xterm.css" />
  <style>
    :root { color-scheme: dark; }
    html, body { height: 100%; margin: 0; background: #1e1e1e; transition: background .2s; }
    /* "Agent holds the mic" — tint the whole surface so the user notices. */
    body.agent-active { background: #16202e; }
    #bar {
      display: flex; align-items: center; gap: 10px;
      font: 12px/1.6 system-ui, "Segoe UI", sans-serif;
      color: #cfcfcf; padding: 6px 10px; background: #252526;
      border-bottom: 1px solid #333;
    }
    body.agent-active #bar { background: #1d3050; border-bottom-color: #2f5a8f; }
    #bar .dot { width: 9px; height: 9px; border-radius: 50%; background: #777; flex: none; }
    #bar .dot.on  { background: #2ecc71; }
    #bar .dot.off { background: #e74c3c; }
    #bar .spacer { flex: 1; }
    #agentBadge {
      display: none; align-items: center; gap: 5px;
      color: #8ab4ff; font-weight: 600; white-space: nowrap;
    }
    body.agent-active #agentBadge { display: inline-flex; }
    #bar button {
      font: 12px system-ui; color: #ddd; background: #333; border: 1px solid #444;
      border-radius: 4px; padding: 3px 10px; cursor: pointer;
    }
    #bar button:hover { background: #3c3c3c; }
    #term { position: absolute; left: 0; right: 0; top: 33px; bottom: 0; padding: 6px; box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="bar">
    <span class="dot" id="dot"></span>
    <span id="status">连接中…</span>
    <span id="agentBadge">🤖 Agent 操作中…</span>
    <span class="spacer"></span>
    <button id="reconnect">重新连接</button>
  </div>
  <div id="term"></div>

  <script src="/vendor/xterm/xterm.js"></script>
  <script src="/vendor/xterm/addon-fit.js"></script>
  <script>
    const dotEl = document.getElementById('dot');
    const statusEl = document.getElementById('status');

    const term = new Terminal({
      cursorBlink: true,
      fontFamily: 'Consolas, "Cascadia Mono", Menlo, monospace',
      fontSize: 14,
      theme: { background: '#1e1e1e', foreground: '#d4d4d4' },
    });
    const baseTheme  = { background: '#1e1e1e', foreground: '#d4d4d4' };
    const agentTheme = { background: '#16202e', foreground: '#d4d4d4' };
    const fit = new FitAddon.FitAddon();
    term.loadAddon(fit);
    term.open(document.getElementById('term'));
    fit.fit();

    let ws = null;
    // Session id: from the URL (agent-created tab) or assigned by the server on
    // first connect. Reused on reconnect so we re-attach to the SAME shell.
    let sessionId = new URLSearchParams(location.search).get('id') || null;
    window.__termId = sessionId;

    function setStatus(text, cls) {
      statusEl.textContent = text;
      dotEl.className = 'dot' + (cls ? ' ' + cls : '');
    }

    function toParent(msg) {
      if (window.parent && window.parent !== window) {
        try { window.parent.postMessage(msg, '*'); } catch {}
      }
    }

    function setOwner(who) {
      const agent = who === 'agent';
      document.body.classList.toggle('agent-active', agent);
      term.options.theme = agent ? agentTheme : baseTheme;
      toParent({ type: 'qv-owner', id: sessionId, who });
    }

    function send(obj) {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
    }

    function connect() {
      if (ws) { try { ws.close(); } catch {} }
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/ws/term`);
      setStatus('连接中…');

      ws.onopen = () => {
        setStatus('已连接', 'on');
        fit.fit();
        send({ type: 'start', id: sessionId || undefined, cols: term.cols, rows: term.rows });
        term.focus();
      };
      ws.onmessage = ev => {
        let msg; try { msg = JSON.parse(ev.data); } catch { return; }
        if (msg.type === 'output')       term.write(msg.data);
        else if (msg.type === 'session') { sessionId = msg.id; window.__termId = msg.id; toParent({ type: 'qv-session', id: msg.id, title: msg.title }); setOwner(msg.owner); }
        else if (msg.type === 'owner')   setOwner(msg.who);
        else if (msg.type === 'exit')    { term.write(`\r\n\x1b[90m[进程已退出，code ${msg.code}]\x1b[0m\r\n`); setStatus('已退出', 'off'); }
      };
      ws.onclose = () => setStatus('已断开', 'off');
      ws.onerror = () => setStatus('连接出错', 'off');
    }

    // Let the host page (index.html) explicitly kill this session on tab close.
    window.killSession = () => send({ type: 'kill' });

    term.onData(data => send({ type: 'input', data }));

    function doFit() {
      // When hosted in a hidden tab pane the iframe is 0×0; skip until it has size.
      if (!document.getElementById('term').clientWidth) return;
      fit.fit();
      send({ type: 'resize', cols: term.cols, rows: term.rows });
    }
    window.addEventListener('resize', doFit);
    // Re-fit whenever the iframe gains/changes size — e.g. the tab pane is shown
    // (0×0 → real size) or the surrounding panel is resized. window 'resize'
    // alone never fires for these.
    new ResizeObserver(() => doFit()).observe(document.getElementById('term'));
    document.getElementById('reconnect').addEventListener('click', connect);

    connect();
  </script>
</body>
</html>
