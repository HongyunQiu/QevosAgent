name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── 三平台并行编译 ──────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_cmd: npm run build
            artifact_glob: desktop/dist/*.exe
            artifact_name: dist-windows

          - os: macos-latest
            build_cmd: npm run build:mac
            artifact_glob: desktop/dist/*.pkg
            artifact_name: dist-macos

          - os: ubuntu-latest
            build_cmd: npm run build:linux
            artifact_glob: desktop/dist/*.AppImage
            artifact_name: dist-linux

    runs-on: ${{ matrix.os }}
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install

      # 下载嵌入式 Python 并安装 agent 依赖（各平台自动选择对应版本）
      - name: Setup embedded Python
        working-directory: desktop
        run: npm run setup
        timeout-minutes: 20

      # Windows：PNG → ICO（多尺寸，BMP编码兼容rcedit）
      - name: Install Pillow for icon generation
        if: runner.os == 'Windows'
        run: pip install pillow -q

      - name: Generate Windows icon
        if: runner.os == 'Windows'
        shell: python
        run: |
          import struct, io, os
          from PIL import Image
          src = 'assets/LOGO_256.png'
          dst = 'desktop/build/icon.ico'
          img = Image.open(src).convert('RGBA')
          sizes = [16, 24, 32, 48, 64, 128, 256]
          entries = []
          for s in sizes:
              r = img.resize((s, s), Image.LANCZOS)
              if s < 256:
                  pix = r.tobytes('raw', 'BGRA')
                  rows = [pix[i*s*4:(i+1)*s*4] for i in range(s)]
                  rows.reverse()
                  mask = b'\x00' * (((s+31)//32)*4 * s)
                  hdr = struct.pack('<IiiHHIIiiII', 40, s, s*2, 1, 32, 0, len(pix), 0, 0, 0, 0)
                  entries.append(hdr + b''.join(rows) + mask)
              else:
                  buf = io.BytesIO(); r.save(buf, 'PNG'); entries.append(buf.getvalue())
          n = len(sizes)
          off = 6 + 16*n
          hdr = bytearray(struct.pack('<HHH', 0, 1, n))
          for i, (s, d) in enumerate(zip(sizes, entries)):
              w = s if s < 256 else 0
              hdr += struct.pack('<BBBBHHII', w, w, 0, 0, 1, 32, len(d), off)
              off += len(d)
          with open(dst, 'wb') as f:
              f.write(hdr)
              for d in entries:
                  f.write(d)
          print(f'icon.ico generated: {os.path.getsize(dst)} bytes')

      # macOS：PNG → ICNS（通过 iconset）
      - name: Generate macOS icon
        if: runner.os == 'macOS'
        run: |
          mkdir -p /tmp/icon.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size assets/LOGO_256.png --out /tmp/icon.iconset/icon_${size}x${size}.png
          done
          sips -z 1024 1024 assets/LOGO_256.png --out /tmp/icon.iconset/icon_512x512@2x.png
          iconutil -c icns /tmp/icon.iconset -o desktop/build/icon.icns

      # Linux：PNG 直接缩放到 256x256
      - name: Generate Linux icon
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y imagemagick
          convert assets/LOGO_256.png -resize 256x256 desktop/build/icon.png

      - name: Build Electron app
        working-directory: desktop
        run: ${{ matrix.build_cmd }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ""
          # 禁止 electron-builder 自行发布，由 release job 统一处理
          EP_DRAFT: false
          PUBLISH_FOR_PULL_REQUEST: false
          GH_TOKEN: ""
          DEBUG: "electron-builder"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  # ── Android APK 构建 ────────────────────────────────────
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ubuntu-latest 预装了 gradle，用它生成 wrapper jar（不提交二进制到仓库）
      - name: Generate Gradle wrapper
        working-directory: mobile/android
        run: gradle wrapper --gradle-version 8.6 --distribution-type bin

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-android
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  # ── 创建 GitHub Release ─────────────────────────────────
  release:
    needs: [build, android]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # 重命名为固定文件名，让网站下载链接永远指向最新版
      - name: Rename to stable download names
        run: |
          find artifacts -name "*.exe"       -exec cp {} artifacts/QevosAgent-Setup.exe \;
          find artifacts -name "*arm64*.pkg" -exec cp {} artifacts/QevosAgent-macOS-arm64.pkg \;
          find artifacts -name "*.pkg" ! -name "*arm64*" -exec cp {} artifacts/QevosAgent-macOS-x64.pkg \;
          find artifacts -name "*.AppImage"  -exec cp {} artifacts/QevosAgent.AppImage \;
          find artifacts -name "*.apk"       -exec cp {} artifacts/QevosAgent-Android.apk \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 上传所有文件（含原版本号文件 + 固定名文件）
          files: artifacts/**/*
          generate_release_notes: false
          fail_on_unmatched_files: false
          body: |
            > **macOS 用户注意**：本应用暂未经 Apple 公证，安装 `.pkg` 时 Gatekeeper 可能提示"无法验证开发者"。
            > **解决方法（二选一）**：
            > 1. 在 Finder 中**右键点击** `.pkg` 文件 → **"打开"** → 弹窗中再点"打开"
            > 2. 在终端执行：`xattr -cr QevosAgent-macOS-*.pkg && open QevosAgent-macOS-*.pkg`
            > 之后按提示完成安装，无需重复操作。

            > **Android 用户注意**：`QevosAgent-Android.apk` 为调试版本，安装前需在手机设置中开启"允许安装未知来源应用"。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
