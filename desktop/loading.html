<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QevosAgent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #cdd9e5;
      font-family: 'SF Mono', 'Cascadia Code', Consolas, 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 20px;
      user-select: none;
      -webkit-app-region: drag; /* allow dragging the window from this area */
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #e6edf3;
      letter-spacing: 1px;
    }

    .logo span {
      color: #388bfd;
    }

    /* Three-dot pulse animation */
    .dots {
      display: flex;
      gap: 8px;
    }

    .dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #388bfd;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40%            { opacity: 1;   transform: scale(1);   }
    }

    .status {
      font-size: 12px;
      color: #7d8590;
    }

    /* Error state */
    .error-box {
      display: none;
      max-width: 520px;
      background: #161b22;
      border: 1px solid #6e2b2b;
      border-radius: 8px;
      padding: 20px 24px;
      text-align: left;
      -webkit-app-region: no-drag;
    }

    .error-box.visible { display: block; }

    .error-title {
      font-size: 13px;
      font-weight: 700;
      color: #f85149;
      margin-bottom: 10px;
    }

    .error-msg {
      font-size: 12px;
      color: #cdd9e5;
      white-space: pre-wrap;
      line-height: 1.7;
    }

    .error-hint {
      margin-top: 14px;
      font-size: 11px;
      color: #7d8590;
      border-top: 1px solid #21262d;
      padding-top: 12px;
    }
  </style>
</head>
<body>
  <div class="logo">Qevos<span>Agent</span></div>

  <div class="dots" id="dots">
    <span></span><span></span><span></span>
  </div>

  <div class="status" id="status">正在启动 Dashboard…</div>

  <div class="error-box" id="error-box">
    <div class="error-title">启动失败</div>
    <div class="error-msg" id="error-msg"></div>
    <div class="error-hint">关闭窗口后重试，或查看控制台日志获取详细信息。</div>
  </div>

  <script>
    // Called by main.js via webContents.executeJavaScript() when startup fails.
    function showError(msg) {
      document.getElementById('dots').style.display   = 'none';
      document.getElementById('status').style.display = 'none';
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('error-box').classList.add('visible');
    }
  </script>
</body>
</html>
